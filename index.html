<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cuaca Premium</title>
    <!-- Memuatkan Chart.js melalui CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e3a8a;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #334155;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        /* Susunan Kad Info Semasa */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 4px solid var(--primary);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #64748b;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0f172a;
        }
        /* Susunan Carta Terasing */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }
        @media (max-width: 500px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .chart-card h3 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: #64748b;
            padding: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Papan Pemuka Cuaca Pintar</h1>
        <p>Analisis Visual Data Cuaca Masa Nyata & Ramalan 7 Hari</p>
    </header>

    <div id="loader" class="loading">Mengambil data maklumat cuaca terkini...</div>

    <div id="dashboard" style="display: none;">
        <!-- BAHAGIAN 1: KAD MAKLUMAT CUACA SEMASA -->
        <div class="stats-grid">
            <div class="stat-card" style="border-top-color: #ef4444;">
                <h3>Suhu Semasa</h3>
                <div class="value" id="current-temp">-</div>
            </div>
            <div class="stat-card" style="border-top-color: #3b82f6;">
                <h3>Kelembapan Semasa</h3>
                <div class="value" id="current-humidity">-</div>
            </div>
            <div class="stat-card" style="border-top-color: #10b981;">
                <h3>Kelajuan Angin</h3>
                <div class="value" id="current-wind">-</div>
            </div>
            <div class="stat-card" style="border-top-color: #f59e0b;">
                <h3>Zon Masa</h3>
                <div class="value" id="location-zone">-</div>
            </div>
        </div>

        <!-- BAHAGIAN 2: CARTA YANG DIASINGKAN -->
        <div class="charts-grid">
            <!-- Carta 1: Suhu -->
            <div class="chart-card">
                <h3>Ramalan Suhu Maksimum (°C)</h3>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>

            <!-- Carta 2: Kelembapan -->
            <div class="chart-card">
                <h3>Trend Kelembapan Maksimum (%)</h3>
                <div class="chart-container">
                    <canvas id="humidityChart"></canvas>
                </div>
            </div>

            <!-- Carta 3: Kelajuan Angin -->
            <div class="chart-card" style="grid-column: span 1;">
                <h3>Ramalan Kelajuan Angin (km/h)</h3>
                <div class="chart-container">
                    <canvas id="windChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Koordinat Kuala Lumpur
const LATITUDE = 3.1390;
const LONGITUDE = 101.6869;

// Meminta data harian (daily) & data semasa (current_weather) sekaligus dari API
const API_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true&daily=temperature_2m_max,relative_humidity_2m_max,windspeed_10m_max&timezone=Asia%2FKuala_Lumpur`;

async function muatDataCuaca() {
    try {
        const respon = await fetch(API_URL);
        const data = await respon.json();
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        // 1. Papar data pada kad ringkasan semasa
        document.getElementById('current-temp').innerText = `${data.current_weather.temperature} °C`;
        document.getElementById('current-wind').innerText = `${data.current_weather.windspeed} km/h`;
        document.getElementById('location-zone').innerText = data.timezone_abbreviation;
        // Ambil data kelembapan hari pertama sebagai anggaran kelembapan semasa
        document.getElementById('current-humidity').innerText = `${data.daily.relative_humidity_2m_max[0]} %`;

        // 2. Bina carta-carta yang berasingan
        binaCartaSuhu(data.daily.time, data.daily.temperature_2m_max);
        binaCartaKelembapan(data.daily.time, data.daily.relative_humidity_2m_max);
        binaCartaAngin(data.daily.time, data.daily.windspeed_10m_max);

    } catch (ralat) {
        console.error("Masalah teknikal:", ralat);
        document.getElementById('loader').innerText = "Gagal memuatkan paparan dashboard.";
    }
}

// Fungsi Carta 1: Suhu (Bar Chart untuk kelainan visual)
function binaCartaSuhu(labels, dataSuhu) {
    const ctx = document.getElementById('tempChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Suhu Maks (°C)',
                data: dataSuhu,
                backgroundColor: 'rgba(239, 68, 68, 0.7)',
                borderColor: '#ef4444',
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// Fungsi Carta 2: Kelembapan (Line Chart)
function binaCartaKelembapan(labels, dataKelembapan) {
    const ctx = document.getElementById('humidityChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Kelembapan (%)',
                data: dataKelembapan,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// Fungsi Carta 3: Kelajuan Angin (Line Chart berkutub/Tension tajam)
function binaCartaAngin(labels, dataAngin) {
    const ctx = document.getElementById('windChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Kelajuan Angin Maks (km/h)',
                data: dataAngin,
                borderColor: '#10b981',
                backgroundColor: 'transparent',
                borderWidth: 3,
                tension: 0,
                pointStyle: 'rectRot',
                pointRadius: 6
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// Jalankan sistem
muatDataCuaca();
</script>
</body>
</html>
